<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Blooming into ONE - Event Coordinator Hub</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      font-family: 'Montserrat', sans-serif !important;
      box-sizing: border-box;
    }

    /* 🖥️ DESKTOP STYLES */
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      width: 100%;
      background: transparent !important;
    }

    body {
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    /* Background Canvas */
    .app-bg-viewport-lock {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background-image: url('./background-checklist.gif'); 
      background-size: cover;           
      background-position: center center; 
      background-repeat: no-repeat;
      pointer-events: none; 
    }

    /* Central Content Frame */
    .app-container {
      position: relative;
      z-index: 2;
      max-width: 450px; 
      width: 100%;
      margin: 100px auto 40px auto; 
      background: transparent; 
      padding: 35px 25px; 
      text-align: center;
    }

    /* Desktop Navigation Top Placement Layouts */
    .nav-container-top {
      display: block;
    }
    .nav-container-bottom {
      display: none;
    }

    /* 📱 MOBILE OVERRIDES (Isolated Constraints) */
    @media (max-width: 768px) {
      html, body {
        overflow: hidden; 
        height: 100%;
      }

      .app-bg-viewport-lock {
        background-image: url('./background-checklist-mobile.jpg'); 
        background-position: top center;
        background-size: 100% 100%; 
        background-repeat: no-repeat;
        height: 100%;
      }
      
      .branding-header {
        display: none !important;
      }

      /* Binds code execution inside the exact boundaries of your background canvas window */
      .app-container {
        position: absolute !important;
        top: 13.5%; 
        bottom: 4%;
        left: 8%;
        right: 8%;
        width: auto !important;
        max-width: none !important;
        margin: 0 !important;
        padding: 15px 5px !important;
        overflow-y: auto !important;
        overflow-x: hidden !important;
        -webkit-overflow-scrolling: touch;
      }

      /* Swaps Back option placement for cleaner mobile spacing view */
      .nav-container-top {
        display: none !important;
      }
      .nav-container-bottom {
        display: block !important;
        margin-top: 20px;
        margin-bottom: 20px;
      }
    }

    /* ✨ THEME PRESET BUTTONS & TYPOGRAPHY STYLESETS */
    h2, h3 { 
      font-weight: 400;
      color: #f36812; 
      margin-top: 0px;
      letter-spacing: -0.5px;
    }

    .branding-header h1 {
      font-size: 1.8rem;
      color: #333333;
      margin: 0;
      font-weight: 500;
    }
    .branding-header h1 span {
      display: block;
      font-size: 2.4rem;
      color: #c842a4; 
      font-weight: 700;
    }

    /* Blueprint Blue Menu/Action Buttons */
    .btn-action {
      width: 100%;
      padding: 15px;
      color: rgb(243, 255, 177);
      background-color: #608fbe;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .btn-action:hover { background-color: #466789; transform: translateY(-1px); }

    /* Amber / Gold Selection Containers */
    .btn-selection {
      width: 100%;
      padding: 16px;
      background: #f7eeab;
      color: #333;
      border: 1px solid #ebd399;
      border-radius: 30px;
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 2px 6px rgba(176,132,0,0.06);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .btn-selection:hover { background: #fff8de; border-color: #b08400; color: #b08400; }

    /* Accordion Panels */
    .accordion-item {
      background: #f7eeab;
      border: 1px solid #ebd399;
      border-radius: 20px;
      margin-bottom: 12px;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(176,132,0,0.04);
      text-align: left;
    }
    .accordion-trigger {
      width: 100%;
      background: none;
      border: none;
      padding: 16px 20px;
      text-align: left;
      font-size: 0.95rem;
      font-weight: 600;
      color: #3d3e3f;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .accordion-trigger:hover { background: #fff8de; }
    .accordion-content {
      padding: 20px;
      background: #ffffff;
      border-top: 1px dashed rgba(176, 132, 0, 0.2);
    }

    /* Back Controls */
    .btn-text-back {
      background: none;
      border: none;
      color: #888;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 10px;
      margin-bottom: 25px;
      cursor: pointer;
      display: inline-block;
    }
    .btn-text-back:hover { color: #333; }

    /* Metadata Records */
    .meta-box {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 15px;
    }
    .meta-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 8px;
      border-bottom: 1px dashed rgba(176, 132, 0, 0.25);
      font-size: 14px;
    }
    .meta-item:last-child { border-bottom: none; }
    .meta-label { font-weight: 700; color: #666; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
    .meta-value { font-weight: 600; color: #333; text-align: right; }
    .meta-value a { color: #b08400; text-decoration: underline; font-weight: 600; }

    /* Forms & Action Modals */
    .receipt-preview-img {
      max-width: 100%;
      height: auto;
      border-radius: 12px;
      margin-top: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      border: 1px solid rgba(0,0,0,0.05);
      display: block;
    }

    label.checkbox-container {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.85rem;
      color: #333333;
      cursor: pointer;
      margin: 15px 0;
      font-weight: 600;
    }
    input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #b08400;
      cursor: pointer;
    }

    textarea {
      width: 100%;
      height: 50px;
      padding: 10px 14px;
      border: 1px solid #e0e0e0;
      border-radius: 15px;
      background: #fafafa;
      resize: none;
      font-size: 0.85rem;
      box-sizing: border-box;
      font-weight: 500;
    }
    textarea:focus {
      outline: none;
      border-color: #b08400;
      background: #ffffff;
    }

    .task-row {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 14px 0;
      border-bottom: 1px dashed rgba(176, 132, 0, 0.2);
    }
    .task-row:last-child { border-bottom: none; }
    .task-main-info { display: flex; align-items: center; gap: 12px; font-size: 0.95rem; font-weight: 600; color: #333; }

    .hidden { display: none !important; }
    .loader { color: #b08400; font-weight: 700; margin: 20px 0; font-size: 14px; }
  </style>
</head>
<body>

<div class="app-bg-viewport-lock"></div>

<div class="app-container">
  
  <div class="branding-header">
    <h1>EVENT COORDINATOR<span>HUB</span></h1>
  </div>

  <div id="loading" class="loader">Loading coordinator Hub...</div>

  <div id="view-home" class="hidden">
    <div style="margin-bottom: 25px;">
      <h2>MANAGEMENT MENU</h2>
    </div>
    <button class="btn-selection" onclick="switchView('view-suppliers')">Supplier Profiles</button>
    <button class="btn-selection" onclick="switchView('view-checklist')">Overall Checklist</button>
  </div>

  <div id="view-suppliers" class="hidden">
    <div class="nav-container-top">
      <button class="btn-text-back" onclick="switchView('view-home')">← Back to Search Menu</button>
    </div>
    <h3>SUPPLIER PROFILES</h3>
    <div id="suppliers-container"></div>
    <div class="nav-container-bottom">
      <button class="btn-text-back" onclick="switchView('view-home')">← Back to Search Menu</button>
    </div>
  </div>

  <div id="view-checklist" class="hidden">
    <div class="nav-container-top">
      <button class="btn-text-back" onclick="switchView('view-home')">← Back to Search Menu</button>
    </div>
    <h3>OVERALL CHECKLIST</h3>
    <div id="checklist-container"></div>
    <div class="nav-container-bottom">
      <button class="btn-text-back" onclick="switchView('view-home')">← Back to Search Menu</button>
    </div>
  </div>

</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycby6gaZQWctKLZPMlcKMU9TEZw6vIZHcP6uBihkZxrH0n5wkfHT7jSdbvXXrvAsSaHVd/exec";

  let dbStore = { suppliers: [], checklist: [] };
  let debounceTimers = {};

  window.onload = function() {
    fetch(API_URL)
      .then(res => res.json())
      .then(data => {
        dbStore = data;
        document.getElementById('loading').classList.add('hidden');
        renderSuppliers();
        renderChecklist();
        switchView('view-home');
      })
      .catch(err => {
        document.getElementById('loading').innerText = "Failed to sync database.";
        console.error(err);
      });
  };

  function switchView(viewId) {
    ['view-home', 'view-suppliers', 'view-checklist'].forEach(id => document.getElementById(id).classList.add('hidden'));
    document.getElementById(viewId).classList.remove('hidden');
  }

  function toggleAccordion(id) {
    const el = document.getElementById(id);
    el.classList.contains('hidden') ? el.classList.remove('hidden') : el.classList.add('hidden');
  }

  function renderSuppliers() {
    const container = document.getElementById('suppliers-container');
    container.innerHTML = '';
    dbStore.suppliers.forEach(sup => {
      const panelId = `sup-panel-${sup.rowId}`;
      container.innerHTML += `
        <div class="accordion-item">
          <button class="accordion-trigger" onclick="toggleAccordion('${panelId}')">
            <span>• ${sup.name}</span>
            <span style="font-size:0.75rem; color:#b08400;">▼</span>
          </button>
          <div id="${panelId}" class="accordion-content hidden">
            <div class="meta-box">
              <div class="meta-item"><span class="meta-label">Item Supplied</span><span class="meta-value">${sup.item}</span></div>
              <div class="meta-item"><span class="meta-label">Facebook Profile</span><span class="meta-value"><a href="${sup.fbLink}" target="_blank">${sup.name}</a></span></div>
              <div class="meta-item"><span class="meta-label">Downpayment Given</span><span class="meta-value">${sup.downpayment}</span></div>
              <div class="meta-item"><span class="meta-label">Remaining Balance</span><span class="meta-value";">${sup.balance}</span></div>
              <div style="margin-top: 10px; text-align: left;">
                <span class="meta-label" style="display:block; margin-bottom:5px;">Receipt Record:</span>
                ${(() => {
                  if (!sup.receipt) return '<span style="color:#888; font-size:13px; font-style:italic;">No image on file</span>';
                  
                  let imgUrl = sup.receipt;
                  if (imgUrl.includes('drive.google.com')) {
                    const matches = imgUrl.match(/\/d\/([a-zA-Z0-9-_]+)/);
                    if (matches && matches[1]) {
                      imgUrl = `https://lh3.googleusercontent.com/d/${matches[1]}`;
                    }
                  }
                  return `<img src="${imgUrl}" class="receipt-preview-img" alt="Receipt Preview" onerror="this.style.display='none';">`;
                })()}
              </div>
            </div>
            <label class="checkbox-container">
              <input type="checkbox" ${sup.isPaid ? 'checked' : ''} onchange="sendUpdate('supplier', ${sup.rowId}, 'isPaid', this.checked)">
              Remaining balance cleared
            </label>
            <textarea placeholder="Add supplier remarks..." oninput="debounceSave('supplier', ${sup.rowId}, 'remarks', this.value)">${sup.remarks}</textarea>
          </div>
        </div>`;
    });
  }

  function renderChecklist() {
    const container = document.getElementById('checklist-container');
    container.innerHTML = '';
    const grouped = {};
    dbStore.checklist.forEach(item => {
      if (!grouped[item.category]) grouped[item.category] = [];
      grouped[item.category].push(item);
    });

    let catIndex = 0;
    for (const catName in grouped) {
      catIndex++;
      const panelId = `cat-panel-${catIndex}`;
      let blockHtml = `
        <div class="accordion-item">
          <button class="accordion-trigger" onclick="toggleAccordion('${panelId}')">
            <span>• ${catName}</span>
            <span style="font-size:0.75rem; color:#b08400;">▼</span>
          </button>
          <div id="${panelId}" class="accordion-content hidden">`;
      
      grouped[catName].forEach(task => {
        blockHtml += `
          <div class="task-row">
            <div class="task-main-info">
              <input type="checkbox" ${task.isDone ? 'checked' : ''} onchange="sendUpdate('checklist', ${task.rowId}, 'isDone', this.checked)">
              <span>${task.item}</span>
            </div>
            <textarea placeholder="Add remarks..." oninput="debounceSave('checklist', ${task.rowId}, 'remarks', this.value)">${task.remarks}</textarea>
          </div>`;
      });
      blockHtml += `</div></div>`;
      container.innerHTML += blockHtml;
    }
  }

  function sendUpdate(type, rowId, col, val) {
    fetch(API_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ type, rowId, col, val })
    });
  }

  function debounceSave(type, rowId, col, val) {
    const timerId = `${type}-${rowId}-${col}`;
    clearTimeout(debounceTimers[timerId]);
    debounceTimers[timerId] = setTimeout(() => {
      sendUpdate(type, rowId, col, val);
    }, 600);
  }

  function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/'/g, "\\'").replace(/"/g, "&quot;");
  }
</script>
</body>
</html>
